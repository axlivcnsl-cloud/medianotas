<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Notas</title>

    <!-- Bootstrap icons -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Sua CSS -- logo abaixo do link do Bootstrap -->
     <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <!-- Menu de navegação -->
    <nav class="navbar navbar-expand-lg my-4">
      <div class="container">
        <a class="navbar-brand title-size" href="#"><i class="bi bi-robot me-1"></i>SisNotas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <i class="bi bi-filter-right"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#">Cadastrar Notas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Alunos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Resumo de Notas</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Conta</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Fazer Login</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Criar Conta</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container">
        <h3 class="display-6">Cadastro de Notas</h3>

        <!-- formulário: form -->
        <form id="form-notas" name="form-notas" method="get" action="">
            <div class="row">
                <section class="my-3 col-md-6">
                    <label for="nome-aluno"  class="form-label">Nome do aluno</label>
                    <input type="text" id="nome-aluno" name="nome-aluno" class="form-control" placeholder="Ex: Nome do/a Aluno/a"
                    minlength="10" maxlength="50" required>
                </section>

                <section class="my-3 col-md-6">
                    <label for="disciplina" class="form-label">Disciplina</label>
                    <select name="disciplina" id="disciplina" 
                    class="form-select">
                        <option value=""  disabled selected>Selecione a disciplina</option>
                        <option value="Matemática">Matemática</option>
                        <option value="Física">Física</option>
                        <option value="Química">Química</option>
                        <option value="Prog Web">Prog Web</option>
                        <option value="Frameworks">Frameworks</option>
                        <option value="Web Desing">Web Desing</option>
                        <option value="Língua Portuguesa">Língua Portuguesa</option>
                </select>
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota1" class="form-label">Nota 1</label>
                    <input type="text" name="nota1" id="nota1" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota2" class="form-label">Nota 2</label>
                    <input type="text" name="nota2" id="nota2" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota3" class="form-label">Nota 3</label>
                    <input type="text" name="nota3" id="nota3" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota4" class="form-label">Nota 4</label>
                    <input type="text" name="nota4" id="nota4" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-5 d-flex justify-content-end">
                    <button type="submit" class="btn btn-danger">Calcular Notas</button>
                </section>
            </div>
        </form>


        <h3 class="display-6 mb-4">Resumo de Notas</h3>
        <div class="table-responsive">

          <table class="table text-center">
            <thead class="table-danger">
              <tr>
                <th>Aluno</th>
                <th>Disciplina</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
                <th>Nota 4</th>
                <th>Média</th>
                <th>Resultado</th>
              </tr>
            </thead>
            
            <tbody id="dados-notas"></tbody>
            <tfoot>
              <tr>
                <td colspan="8">Dados atualizados em: </td>
              </tr>
            </tfoot>
            
          </table>
        </div>



    </main>
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
